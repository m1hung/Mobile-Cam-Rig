<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Multi-Cam Control Center</title>
    <style>
        :root {
            /* Theme Variables */
            --bg-color: #0d0d0d; --surface-color: #1a1a1c; --surface-elevated: #262629;
            --header-bg: rgba(26, 26, 28, 0.85); --border-color: #333336; --divider: #262629;
            --modal-bg: rgba(0, 0, 0, 0.7); --text-primary: #f0f0f0; --text-secondary: #9aa0a6;
            --primary-color: #4a6fa5; --danger-color: #b34d4d; --success-color: #5b8a5e;
            --warning-color: #b58940; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px;
        }

        [data-theme="light"] {
            --bg-color: #f5f6f8; --surface-color: #ffffff; --surface-elevated: #eef0f3;
            --header-bg: rgba(255, 255, 255, 0.9); --border-color: #d1d5db; --divider: #e5e7eb;
            --modal-bg: rgba(0, 0, 0, 0.4); --text-primary: #202124; --text-secondary: #5f6368;
        }

        /* Base Resets & Layout */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-primary); -webkit-font-smoothing: antialiased; padding-bottom: calc(140px + env(safe-area-inset-bottom, 0px)); transition: background-color 0.2s, color 0.2s; }
        
        /* Utility Classes */
        .flex-row { display: flex; align-items: center; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        
        /* Header & Dash */
        header { position: sticky; top: 0; background: var(--header-bg); backdrop-filter: blur(16px); padding: calc(12px + env(safe-area-inset-top, 0px)) 20px 12px; z-index: 100; border-bottom: 1px solid var(--border-color); }
        .app-logo { height: 26px; border-radius: 6px; }
        header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; margin: 0; }
        .icon-btn { background: var(--surface-elevated); border: 1px solid var(--border-color); height: 36px; width: 36px; border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text-primary); transition: 0.2s; }
        .icon-btn:hover { background: var(--border-color); }
        .dashboard-header { padding: 20px 20px 10px; gap: 12px; }
        .pill-btn { background: var(--surface-color); border: 1px solid var(--border-color); padding: 10px 16px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-primary); }

        /* Computer Cards (Shared) */
        .computer-list { display: flex; flex-direction: column; gap: 16px; padding: 10px 20px; }
        .card-base { background: var(--surface-color); border-radius: var(--radius-lg); border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; }
        .dot-ready { background: var(--success-color); }
        .dot-rec { background: var(--danger-color); box-shadow: 0 0 6px rgba(179, 77, 77, 0.6); }
        .dot-error { background: var(--warning-color); }
        .drive-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .drive-text { font-size: 11px; font-weight: 600; color: var(--text-secondary); }
        .progress-bar { width: 100%; height: 6px; background: var(--surface-elevated); border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); }
        .progress-fill.full { background: var(--danger-color); }
        
        /* Buttons */
        .btn-card-rec { background: var(--surface-elevated); border: 1px solid var(--border-color); color: var(--success-color); height: 36px; width: 36px; border-radius: 50%; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-card-rec.is-recording { background: var(--danger-color); border-color: var(--danger-color); color: #fff; }
        .action-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px 16px; }
        .action-btn { background: var(--surface-elevated); color: var(--text-primary); border: 1px solid transparent; padding: 10px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .action-btn:hover { background: var(--border-color); }
        .action-btn.warning { color: var(--warning-color); border-color: rgba(181, 137, 64, 0.3); }
        .action-btn.danger { color: var(--danger-color); border-color: rgba(179, 77, 77, 0.3); }

        /* Detailed View Specifics */
        .card-top { padding: 16px; border-bottom: 1px solid var(--divider); }
        .camera-feed { height: 160px; background: var(--surface-elevated); color: var(--text-secondary); font-size: 12px; font-weight: 500; }
        .card-bottom { padding: 16px; gap: 16px; }
        
        /* Minimal View Specifics */
        .minimal-card { border-radius: var(--radius-md); padding: 16px; gap: 12px; }
        .minimal-actions { padding-top: 12px; border-top: 1px solid var(--divider); padding-bottom: 0; }

        /* Diagnostics */
        .diagnostics { background: rgba(181, 137, 64, 0.1); color: var(--warning-color); padding: 10px 16px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border-color); display: none; }
        .has-error .diagnostics { display: block; }

        /* Modals & Forms */
        .modal-overlay { position: fixed; inset: 0; background: var(--modal-bg); z-index: 1000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--surface-color); padding: 24px; border-radius: var(--radius-lg); width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 16px; }
        .modal-content h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .modal-content label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: -10px; }
        .modal-input { width: 100%; padding: 12px; background: var(--surface-elevated); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: var(--radius-sm); font-size: 14px; outline: none; }
        input::-webkit-calendar-picker-indicator { color: var(--text-secondary); opacity: 1; cursor: pointer; }
        .error-log-container { max-height: 200px; overflow-y: auto; background: var(--surface-elevated); padding: 12px; border-radius: var(--radius-sm); font-family: monospace; font-size: 12px; color: var(--warning-color); white-space: pre-wrap; border: 1px solid var(--border-color); user-select: text; }

        .operator-inputs { display: flex; gap: 8px; margin-bottom: 4px; }
        .operator-inputs input, .operator-inputs select { flex: 1; min-width: 0; }
        .operator-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: -5px; }
        .op-tag { background: rgba(74, 111, 165, 0.15); color: var(--primary-color); border: 1px solid rgba(74, 111, 165, 0.3); padding: 6px 12px; border-radius: 14px; font-size: 12px; display: flex; align-items: center; gap: 8px; }
        
        /* Bottom Bar */
        .bottom-action-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--header-bg); backdrop-filter: blur(16px); border-top: 1px solid var(--border-color); padding: 12px 20px calc(16px + env(safe-area-inset-bottom, 0px)); z-index: 100; }
        .btn-record-all { height: 50px; flex: 1; border-radius: var(--radius-md); background: var(--success-color); color: #fff; border: none; font-weight: 600; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .btn-record-all.recording { background: var(--danger-color); }
        .toast { position: fixed; bottom: calc(100px + env(safe-area-inset-bottom, 0px)); left: 50%; transform: translateX(-50%); background: var(--surface-elevated); color: var(--text-primary); border: 1px solid var(--border-color); padding: 12px 24px; border-radius: var(--radius-md); font-size: 13px; font-weight: 600; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; z-index: 1000; }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <header class="flex-between">
        <div class="flex-row" style="gap: 12px;">
            <svg id="appLogo" class="app-logo" xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='#4a6fa5' rx='10'/><circle cx='50' cy='50' r='25' fill='white'/></svg>
            <h1>Session Control</h1>
        </div>
        <div class="flex-row" style="gap: 12px;">
            <button class="icon-btn flex-center" onclick="openModal('errorLogModal')">📋</button>
            <button class="icon-btn flex-center" onclick="openModal('ticketModal')">🎫</button>
            <button class="icon-btn flex-center" onclick="toggleTheme()" id="themeToggleBtn">☀️</button>
        </div>
    </header>

    <div class="dashboard-header flex-between">
        <button class="pill-btn flex-row" style="flex:1; color:var(--primary-color)" onclick="openModal('metadataModal')" id="metaSummaryBtn">🏷️ Schema: None</button>
        <button class="pill-btn flex-center" onclick="toggleView()">≡</button>
    </div>

    <div class="computer-list" id="computerList"></div>

    <div class="bottom-action-bar flex-row" style="gap:12px">
        <button class="btn-record-all flex-center" id="globalRecordBtn" onclick="toggleGlobalRecord()">
            <span style="margin-right:8px">⏺</span> <span id="recordText">Start Session</span>
        </button>
    </div>

    <div id="toast" class="toast"></div>

    <div id="modalContainer">
        
        <div class="modal-overlay" id="errorLogModal">
            <div class="modal-content">
                <h3 style="margin-bottom:0">System Error Log</h3>
                <div class="error-log-container" id="errorLogContainer"></div>
                <div class="flex-row" style="gap:10px; margin-top:8px">
                    <button class="action-btn" style="flex:1" onclick="closeModal('errorLogModal')">Close</button>
                    <button class="action-btn" style="flex:1; background:var(--primary-color); color:#fff" onclick="copyErrorLog()">Copy</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="addRigModal">
            <div class="modal-content">
                <h3>Add Camera Rig</h3>
                <label>Rig Name</label>
                <input type="text" id="rigNameInput" class="modal-input" list="rigOptionsList" placeholder="Type name or select preset...">
                <datalist id="rigOptionsList">
                    <option value="Cam-Rig Alpha">
                    <option value="Cam-Rig Beta">
                    <option value="Cam-Rig Gamma">
                    <option value="Drone Cam 1">
                    <option value="Steadicam 1">
                    <option value="Crash Cam">
                </datalist>
                <div class="flex-row" style="gap:10px; margin-top:8px">
                    <button class="action-btn" style="flex:1" onclick="closeModal('addRigModal')">Cancel</button>
                    <button class="action-btn" style="flex:1; background:var(--primary-color); color:#fff" onclick="confirmAddRig()">Add Rig</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="ticketModal">
            <div class="modal-content">
                <h3>Report Issue</h3>
                <label>Issue Type</label>
                <select id="ticketType" class="modal-input">
                    <option value="Faulty Equipment">Faulty Equipment</option>
                    <option value="Connectivity">Connectivity Issue</option>
                    <option value="Software Glitch">Software Glitch</option>
                </select>
                <label>Affected Rig</label>
                <select id="ticketRigSelect" class="modal-input"></select>
                <label>Description</label>
                <textarea id="ticketDescription" class="modal-input" style="min-height: 80px; resize: vertical;" placeholder="Details..."></textarea>
                <div class="flex-row" style="gap:10px; margin-top:8px">
                    <button class="action-btn" style="flex:1" onclick="closeModal('ticketModal')">Cancel</button>
                    <button class="action-btn" style="flex:1; background:var(--warning-color); color:#fff" onclick="submitTicket()">Submit</button>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="metadataModal">
            <div class="modal-content">
                <h3>Session Metadata</h3>
                <label>Quick Preset</label>
                <select id="presetSelect" class="modal-input" onchange="applyPreset(this.value)">
                    <option value="none">Custom / None</option>
                    <option value="1">Studio Setup</option>
                    <option value="2">Field Action</option>
                </select>

                <label>Location & Equipment</label>
                <div class="operator-inputs">
                    <select id="metaLoc" class="modal-input"><option value="Studio A">Studio A</option><option value="Ext. City">Ext. City</option></select>
                    <select id="metaEq" class="modal-input"><option value="ARRI Alexa">ARRI Alexa</option><option value="RED Komodo">RED Komodo</option></select>
                </div>
                
                <label>Add Crew</label>
                <div class="operator-inputs">
                    <input type="text" id="rosterInput" class="modal-input" placeholder="Name...">
                    <select id="roleSelect" class="modal-input" style="flex: 0.6;">
                        <option value="Operator">Op</option><option value="1st AC">1st AC</option>
                    </select>
                </div>
                <button class="action-btn" onclick="addOperator()">+ Add to Session</button>
                <div class="operator-tags" id="selectedOperators"></div>

                <div class="flex-row" style="gap:10px; margin-top:8px">
                    <button class="action-btn" style="flex:1" onclick="closeModal('metadataModal')">Cancel</button>
                    <button class="action-btn" style="flex:1; background:var(--primary-color); color:#fff" onclick="saveMetadata()">Apply</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Data & State
        let state = {
            isRecording: false,
            isDetailed: true,
            theme: 'dark',
            schema: null,
            logs: [],
            tempOps: [],
            idCounter: 3,
            computers: [
                { id: 1, name: "Cam-Rig Alpha", mounted: true, usage: 95, rec: false, errors: [] },
                { id: 2, name: "Cam-Rig Beta", mounted: false, usage: 42, rec: false, errors: [] },
            ]
        };

        const schemas = [
            { id: '1', label: "Studio Setup", tags: { loc: "Studio A", eq: "ARRI Alexa" } },
            { id: '2', label: "Field Action", tags: { loc: "Ext. City", eq: "RED Komodo" } }
        ];

        // Utility: Timestamps
        const getTS = () => new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        
        // Boot Errors
        state.computers[0].errors.push(`[${getTS()}] Drive Full`);
        state.computers[1].errors.push(`[${getTS()}] Unmounted`);
        state.computers.forEach(c => c.errors.forEach(e => state.logs.push(`${c.name}: ${e}`)));

        // --- Optimized Rendering ---
        function render() {
            renderList();
            updateUI();
        }

        function renderList() {
            const list = document.getElementById('computerList');
            // BATCH DOM UPDATE: Huge performance boost over appending in a loop
            list.innerHTML = state.computers.map(comp => state.isDetailed ? getDetailedCard(comp) : getMinimalCard(comp)).join('');
            
            // Note: Now calls openModal instead of bypassing the modal
            list.innerHTML += `<button class="action-btn" style="border: 2px dashed var(--border-color); padding: 20px; border-radius: var(--radius-lg); font-size: 14px;" onclick="openModal('addRigModal')">+ Add New Rig</button>`;
        }

        // --- Card Templates ---
        function getDetailedCard(comp) {
            const isFull = comp.usage >= 90;
            const status = comp.errors.length ? 'dot-error' : (comp.rec ? 'dot-rec' : 'dot-ready');
            return `
            <div class="card-base ${comp.errors.length ? 'has-error' : ''}">
                <div class="card-top flex-between">
                    <div class="flex-row" style="gap:10px"><div class="status-dot ${status}"></div> <b>${comp.name}</b></div>
                    <button class="btn-card-rec flex-center ${comp.rec ? 'is-recording' : ''}" onclick="toggleRec(${comp.id})">${comp.rec ? '⏹' : '⏺'}</button>
                </div>
                <div class="diagnostics">${comp.errors.join('<br>')}</div>
                <div class="camera-feed flex-center">Feed Offline</div>
                <div class="card-bottom flex-row">
                    <div class="drive-info">
                        <div class="drive-text flex-between"><span>Storage</span><span>${comp.usage}%</span></div>
                        <div class="progress-bar"><div class="progress-fill ${isFull ? 'full' : ''}" style="width:${comp.usage}%"></div></div>
                    </div>
                </div>
                <div class="action-grid">
                    <button class="action-btn ${comp.mounted ? '' : 'warning'}" onclick="toggleMount(${comp.id})">${comp.mounted ? '⏏ Unmount' : '⬇ Mount'}</button>
                    <button class="action-btn warning" onclick="erase(${comp.id})" ${!comp.mounted || comp.rec ? 'disabled' : ''}>Erase</button>
                    <button class="action-btn danger" onclick="removeRig(${comp.id})">Remove</button>
                </div>
            </div>`;
        }

        function getMinimalCard(comp) {
            const isFull = comp.usage >= 90;
            const status = comp.errors.length ? 'dot-error' : (comp.rec ? 'dot-rec' : 'dot-ready');
            return `
            <div class="card-base minimal-card ${comp.errors.length ? 'has-error' : ''}">
                <div class="flex-between">
                    <div class="flex-row" style="gap:10px"><div class="status-dot ${status}"></div> <b>${comp.name}</b></div>
                    <div class="flex-row" style="gap:16px">
                        <div style="width:60px">
                            <div class="drive-text flex-between" style="font-size:10px; margin-bottom:4px"><span>${comp.usage}%</span></div>
                            <div class="progress-bar"><div class="progress-fill ${isFull ? 'full' : ''}" style="width:${comp.usage}%"></div></div>
                        </div>
                        <button class="btn-card-rec flex-center ${comp.rec ? 'is-recording' : ''}" style="width:32px; height:32px" onclick="toggleRec(${comp.id})">${comp.rec ? '⏹' : '⏺'}</button>
                    </div>
                </div>
                <div class="diagnostics" style="border:none; border-radius:var(--radius-sm); padding:8px">${comp.errors.join('<br>')}</div>
                <div class="action-grid minimal-actions">
                    <button class="action-btn ${comp.mounted ? '' : 'warning'}" onclick="toggleMount(${comp.id})">${comp.mounted ? '⏏ Unmount' : '⬇ Mount'}</button>
                    <button class="action-btn warning" onclick="erase(${comp.id})" ${!comp.mounted || comp.rec ? 'disabled' : ''}>Erase</button>
                    <button class="action-btn danger" onclick="removeRig(${comp.id})">Remove</button>
                </div>
            </div>`;
        }

        // --- Core Interactions ---
        function toggleRec(id) {
            const c = state.computers.find(x => x.id === id);
            if (c.errors.length) return logAndToast(`⚠️ Cannot record ${c.name}`, `${c.name} failed rec.`, 'var(--danger-color)');
            c.rec = !c.rec;
            state.isRecording = state.computers.some(x => x.rec);
            render();
        }

        function toggleGlobalRecord() {
            state.isRecording = !state.isRecording;
            let fails = 0;
            state.computers.forEach(c => {
                if (state.isRecording && !c.errors.length) c.rec = true;
                else if (state.isRecording) fails++;
                else c.rec = false;
            });
            render();
            fails > 0 ? logAndToast(`⏺ Session Started (${fails} failed)`, 'Global rec fail', 'var(--warning-color)') 
                      : toast(state.isRecording ? '⏺ Session Started' : '⏹ Session Paused');
        }

        function toggleMount(id) {
            const c = state.computers.find(x => x.id === id);
            c.mounted = !c.mounted;
            c.rec = false;
            c.errors = !c.mounted ? [`[${getTS()}] Unmounted`] : (c.usage >= 90 ? [`[${getTS()}] Drive Full`] : []);
            render();
        }

        function erase(id) {
            const c = state.computers.find(x => x.id === id);
            if(c) { c.usage = 0; c.errors = []; render(); toast(`🧹 ${c.name} Erased`); }
        }

        function removeRig(id) { state.computers = state.computers.filter(x => x.id !== id); render(); }
        
        function confirmAddRig() {
            const inputVal = document.getElementById('rigNameInput').value.trim();
            const finalName = inputVal !== '' ? inputVal : `Camera Rig ${state.idCounter + 1}`;
            state.computers.push({ id: ++state.idCounter, name: finalName, mounted: true, usage: Math.floor(Math.random() * 80), rec: state.isRecording, errors: [] });
            
            document.getElementById('rigNameInput').value = '';
            closeModal('addRigModal');
            render();
            toast(`📸 ${finalName} Added`);
        }

        function toggleView() { state.isDetailed = !state.isDetailed; render(); }
        function toggleTheme() {
            state.theme = state.theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', state.theme);
            document.getElementById('themeToggleBtn').innerText = state.theme === 'dark' ? '☀️' : '🌙';
        }

        // --- Helpers & Modals ---
        function updateUI() {
            const btn = document.getElementById('globalRecordBtn');
            btn.className = `btn-record-all flex-center ${state.isRecording ? 'recording' : ''}`;
            btn.innerHTML = `<span style="margin-right:8px">${state.isRecording ? '⏹' : '⏺'}</span> ${state.isRecording ? 'STOP' : 'Start Session'}`;
            
            const metaBtn = document.getElementById('metaSummaryBtn');
            metaBtn.innerText = state.schema ? `🏷️ Schema: ${state.schema}` : '🏷️ Schema: None';
        }

        let toastTimer;
        function toast(msg, color = 'var(--text-primary)') {
            const el = document.getElementById('toast');
            el.innerText = msg; el.style.color = color; el.classList.add('show');
            clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
        }

        function logAndToast(toastMsg, logMsg, color) {
            state.logs.push(`[${getTS()}] ${logMsg}`);
            toast(toastMsg, color);
            const logBox = document.getElementById('errorLogContainer');
            if(logBox) logBox.innerHTML = state.logs.join('<br>');
        }

        function openModal(id) { 
            if(id === 'ticketModal') {
                const rigSelect = document.getElementById('ticketRigSelect');
                rigSelect.innerHTML = '<option value="General">General / All Rigs</option>' + state.computers.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            }
            document.getElementById(id).classList.add('active'); 
        }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function copyErrorLog() {
            if(!state.logs.length) return toast('⚠️ No logs to copy');
            const ta = document.createElement("textarea"); ta.value = state.logs.join('\n');
            ta.style.position = "fixed"; document.body.appendChild(ta); ta.select();
            try { document.execCommand('copy') ? toast('📋 Copied') : toast('❌ Failed'); } catch(e) {}
            document.body.removeChild(ta); closeModal('errorLogModal');
        }

        function submitTicket() { closeModal('ticketModal'); toast('🎟️ Ticket Submitted'); }
        
        function applyPreset(val) {
            if(val === 'none') return;
            const s = schemas.find(x => x.id === val);
            document.getElementById('metaLoc').value = s.tags.loc;
            document.getElementById('metaEq').value = s.tags.eq;
        }

        function addOperator() {
            const name = document.getElementById('rosterInput').value.trim();
            const role = document.getElementById('roleSelect').value;
            if (!name) return;
            state.tempOps.push(`${name} (${role})`);
            document.getElementById('rosterInput').value = '';
            renderOps();
        }

        function removeOp(index) { state.tempOps.splice(index, 1); renderOps(); }
        function renderOps() {
            document.getElementById('selectedOperators').innerHTML = state.tempOps.map((op, i) => 
                `<div class="op-tag">${op} <span style="cursor:pointer" onclick="removeOp(${i})">&times;</span></div>`
            ).join('');
        }

        function saveMetadata() {
            const p = document.getElementById('presetSelect').value;
            state.schema = p !== 'none' ? schemas.find(x => x.id === p).label : 'Custom';
            closeModal('metadataModal');
            render();
            toast('✅ Metadata Applied');
        }

        // Init
        render();
    </script>
</body>
</html>
